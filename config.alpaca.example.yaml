universe:
  mode: curated_watchlist
  categories:
    quality_core: [NVDA, AMD, AAPL, MSFT, GOOGL, AMZN, META, AVGO, TSM, ORCL, CRM, NOW, PANW, CRWD, SNOW, COST, V, MA, LRCX, ASML, MU, INTU]
    growth_premium: [TSLA, PLTR, SOFI, HOOD, ARM, RIVN, AFRM, SHOP, NET, DDOG, MDB, U, ROKU, SE, DKNG, APP, SMCI, CELH, TTD]
    crypto_beta: [COIN, MSTR, IBIT, MARA, RIOT, CLSK, HUT, IREN]
    index_etf: [SPY, QQQ, IWM, SMH, XLK, XLE, ARKK, TLT, DIA, XLF, XBI]

providers:
  options: alpaca
  earnings: finnhub
  fundamentals: later

filters:
  min_dte: 14
  max_dte: 45
  min_delta: -0.35
  # Include safer, farther-OTM puts below 0.15 absolute delta.
  # Put deltas are negative, so -0.05 to -0.15 maps to 0.05–0.15 abs delta.
  max_delta: -0.05
  # Alpaca Basic/free options snapshots may not include open interest or Greeks.
  # Keep these relaxed until Tradier/Schwab is available.
  min_open_interest: 0
  min_volume: 0
  max_bid_ask_spread_pct: 35
  min_bid: 0.05
  allow_itm: false
  avoid_earnings_within_days: 14

ranking:
  top_n: 10
