name: Update CSP Radar data

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/update-csp-data.yml'
  schedule:
    # GitHub cron uses UTC. During EDT: 10:15 AM ET = 14:15 UTC, 3:15 PM ET = 19:15 UTC.
    - cron: '15 14 * * 1-5'
    - cron: '15 19 * * 1-5'

permissions:
  contents: write

concurrency:
  group: csp-radar-refresh
  cancel-in-progress: false

env:
  TZ: America/New_York
  PYTHONUNBUFFERED: '1'

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Validate source
        run: python -m py_compile csp_radar/*.py csp_radar/data_sources/*.py scripts/*.py

      - name: Fetch previous published snapshot
        run: |
          curl -fsSL "https://dremonkey23.github.io/CSP/data/report-latest.json?cache=$(date +%s)" -o /tmp/csp-previous-report.json || true

      - name: Run Tradier CSP scan
        env:
          TRADIER_TOKEN: ${{ secrets.TRADIER_TOKEN }}
        run: python -m csp_radar.scanner --config config.example.yaml

      - name: Build static dashboard payload
        run: python scripts/build_static_site.py --out /tmp/csp-pages-output --previous /tmp/csp-previous-report.json

      - name: Publish to gh-pages
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages:gh-pages
          rm -rf /tmp/csp-gh-pages
          git worktree add /tmp/csp-gh-pages gh-pages
          rsync -a --delete --exclude='.git' /tmp/csp-pages-output/ /tmp/csp-gh-pages/
          cd /tmp/csp-gh-pages
          git add -A
          if git diff --cached --quiet; then
            echo "No dashboard data changes to publish."
          else
            git commit -m "Update CSP Radar snapshot"
            git push origin gh-pages
          fi
