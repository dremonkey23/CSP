name: CSP Radar watchdog

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. During EDT: 10:30 AM ET = 14:30 UTC, 3:30 PM ET = 19:30 UTC.
    # This does not run the scanner unless the scheduled refresh is stale/failed/missed.
    - cron: '30 14,19 * * 1-5'

permissions:
  actions: write
  contents: read

env:
  TZ: America/New_York
  PYTHONUNBUFFERED: '1'

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - name: Check latest dashboard data and dispatch one retry if stale
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          WORKFLOW_FILE: update-csp-data.yml
          LIVE_REPORT_URL: https://dremonkey23.github.io/CSP/data/report-latest.json
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request
          from datetime import datetime, time
          from zoneinfo import ZoneInfo

          repo = os.environ['REPO']
          workflow_file = os.environ['WORKFLOW_FILE']
          token = os.environ['GH_TOKEN']
          live_report_url = os.environ['LIVE_REPORT_URL']
          tz = ZoneInfo('America/New_York')
          now = datetime.now(tz)

          # Morning watchdog validates the 10:15 ET refresh; afternoon validates 3:15 ET.
          target_time = time(15, 15) if now.hour >= 13 else time(10, 15)
          slot = 'afternoon' if target_time.hour == 15 else 'morning'
          required_after = datetime.combine(now.date(), target_time, tzinfo=tz)

          def request_json(url, *, method='GET', payload=None):
              data = None if payload is None else json.dumps(payload).encode('utf-8')
              headers = {
                  'Accept': 'application/vnd.github+json',
                  'User-Agent': 'CSP-Radar-Watchdog',
              }
              if 'api.github.com' in url:
                  headers['Authorization'] = f'Bearer {token}'
                  headers['X-GitHub-Api-Version'] = '2022-11-28'
              req = urllib.request.Request(url, data=data, method=method, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as resp:
                  body = resp.read().decode('utf-8')
                  return json.loads(body) if body else {}

          stale_reasons = []
          latest_updated = None
          try:
              report = request_json(f'{live_report_url}?watchdog={int(now.timestamp())}')
              updated_text = report.get('updated_at') or ''
              if updated_text:
                  latest_updated = datetime.strptime(updated_text, '%Y-%m-%d %H:%M:%S %Z')
                  latest_updated = latest_updated.replace(tzinfo=tz)
              else:
                  stale_reasons.append('live report has no updated_at')
              if not latest_updated or latest_updated < required_after:
                  stale_reasons.append(f'live report not updated after {required_after:%Y-%m-%d %H:%M %Z}')
          except Exception as exc:
              stale_reasons.append(f'could not fetch/parse live report: {exc}')

          # Check latest data-refresh workflow run too. A failed latest run is retry-worthy.
          try:
              runs = request_json(f'https://api.github.com/repos/{repo}/actions/workflows/{workflow_file}/runs?per_page=5')
              workflow_runs = runs.get('workflow_runs', [])
              if workflow_runs:
                  latest = workflow_runs[0]
                  print('latest_refresh_run', latest.get('id'), latest.get('event'), latest.get('status'), latest.get('conclusion'), latest.get('created_at'))
                  if latest.get('status') == 'completed' and latest.get('conclusion') not in ('success', 'skipped'):
                      stale_reasons.append(f"latest refresh run concluded {latest.get('conclusion')}")
              else:
                  stale_reasons.append('no refresh workflow runs found')
          except Exception as exc:
              stale_reasons.append(f'could not inspect refresh workflow runs: {exc}')

          if not stale_reasons:
              print(f'CSP Radar watchdog: {slot} slot fresh; latest_updated={latest_updated:%Y-%m-%d %H:%M:%S %Z}')
              sys.exit(0)

          print('CSP Radar watchdog: stale/failed/missed refresh detected')
          for reason in stale_reasons:
              print('-', reason)
          print(f'dispatching one retry for {workflow_file} on main')
          request_json(
              f'https://api.github.com/repos/{repo}/actions/workflows/{workflow_file}/dispatches',
              method='POST',
              payload={'ref': 'main'},
          )
          print('retry dispatched')
          PY
